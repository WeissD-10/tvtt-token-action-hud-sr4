name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update module.json version and download URL
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          jq \
            --arg version "$VERSION" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/v$VERSION/token-action-hud-sr4.zip" \
            '
            .version = $version |
            .download = $download
            ' \
            module.json > module.tmp.json

          mv module.tmp.json module.json

      - name: Create release zip
        run: |
          zip -r token-action-hud-sr4.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.md" \
            -x "token-action-hud-sr4.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            module.json
            token-action-hud-sr4.zip