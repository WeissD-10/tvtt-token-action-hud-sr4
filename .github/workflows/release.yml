name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Create module.zip
        run: zip -r module.zip . --exclude "*.git*" --exclude ".github/*" --exclude "*.md" --exclude "module.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            module.json
            module.zip
